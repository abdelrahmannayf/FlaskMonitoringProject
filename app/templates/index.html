<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Abdelrahman Nayf</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            max-width: 700px;
            width: 90%;
            backdrop-filter: blur(10px);
        }
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        h1 { font-size: 2.2rem; margin-bottom: 8px; }
        .title {
            color: #a78bfa;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .badge {
            background: rgba(167,139,250,0.15);
            border: 1px solid rgba(167,139,250,0.4);
            color: #a78bfa;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .links { display: flex; gap: 15px; justify-content: center; }
        .btn {
            padding: 10px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-2px); }
        .footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">👨‍💻</div>
        <h1>Abdelrahman Nayf</h1>
        <p class="title">DevOps Engineer</p>
        <div class="badges">
            <span class="badge">🐳 Docker</span>
            <span class="badge">☸️ Kubernetes</span>
            <span class="badge">⚙️ Jenkins</span>
            <span class="badge">🔄 ArgoCD</span>
            <span class="badge">🌍 Terraform</span>
            <span class="badge">🤖 Ansible</span>
            <span class="badge">📊 Prometheus</span>
            <span class="badge">📈 Grafana</span>
        </div>
        <div class="links">
            <a href="https://github.com/abdelrahmannayf" class="btn btn-primary">GitHub</a>
            <a href="https://www.linkedin.com/in/abdelrahman-nayf-b0a365214" class="btn btn-secondary">LinkedIn</a>
        </div>
        <p class="footer">Flask Monitoring Stack — Prometheus + Grafana + Kubernetes</p>
    </div>
</body>
</html>
